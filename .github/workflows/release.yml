name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: langscan
  LINUX_ASSET_NAME: langscan-linux-x86_64
  WINDOWS_ASSET_NAME: langscan-windows-x86_64.exe

jobs:
  build-linux:
    name: Build linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        shell: bash
        run: cargo build --release

      - name: Prepare Linux asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${BINARY_NAME}" "dist/${LINUX_ASSET_NAME}"
          strip "dist/${LINUX_ASSET_NAME}" || true
          chmod +x "dist/${LINUX_ASSET_NAME}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: langscan-linux-x86_64
          path: dist/${{ env.LINUX_ASSET_NAME }}
          if-no-files-found: error

  build-windows:
    name: Build windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        shell: pwsh
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare Windows asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/${env:BINARY_NAME}.exe" "dist/${env:WINDOWS_ASSET_NAME}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: langscan-windows-x86_64
          path: dist/${{ env.WINDOWS_ASSET_NAME }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/langscan-linux-x86_64/${{ env.LINUX_ASSET_NAME }}
            dist/langscan-windows-x86_64/${{ env.WINDOWS_ASSET_NAME }}
